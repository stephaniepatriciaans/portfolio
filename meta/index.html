<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Repo Meta — DSC 106 Lab 6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="container">
      <h1>Codebase Meta</h1>
      <p>This page summarizes <code>meta/loc.csv</code> and visualizes commit activity.</p>

      <h2>Summary stats</h2>
      <div id="stats"></div>

      <h2>Commits by time of day</h2>
      <p id="selection-count">No commits selected</p>
      <div id="chart"></div>

      <h3>Language breakdown (selection)</h3>
      <dl id="language-breakdown" class="stats"></dl>

      <!-- Hover tooltip -->
      <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd><a href="" id="commit-link" target="_blank" rel="noopener noreferrer"></a></dd>
        <dt>Date</dt>
        <dd id="commit-date"></dd>
        <dt>Author</dt>
        <dd id="commit-author"></dd>
        <dt>Lines edited</dt>
        <dd id="commit-lines"></dd>
        <dt>Time</dt>
        <dd id="commit-time"></dd>
      </dl>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
