<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <title>Repo Meta — DSC 106 Lab 8</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- main site theme + layout -->
    <link href="../style.css" rel="stylesheet" />

    <!-- meta-only tweaks -->
    <link href="./style.css" rel="stylesheet" />

    <!-- main style.css is in the project root -->
    <link href="./style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Theme switcher copied from your home page -->
    <header class="site-header">
      <div class="site-header-inner">
        <div class="theme-switcher">
        </div>
      </div>
    </header>

    <main class="container meta-main">
      <h1>Codebase Meta</h1>
      <p>
        This page summarizes <code>meta/loc.csv</code> and visualizes commit activity.
      </p>

      <h2>Summary stats</h2>
      <div id="stats"></div>

      <h2>Commits by time of day</h2>

      <!-- Slider filter -->
      <div class="commit-filter">
        <label for="commit-progress">
          Show commits until:
          <input
            type="range"
            id="commit-progress"
            min="0"
            max="100"
            value="100"
          />
          <time id="commit-time"></time>
        </label>
      </div>

      <!-- Scrollytelling layout -->
      <div id="scrolly-1">
        <!-- Left: story text -->
        <div id="scatter-story"></div>

        <!-- Right: sticky scatter plot + breakdown -->
        <div id="scatter-plot">
          <p id="selection-count" class="chart-toolbar">
            All commits
            <button id="clear-btn" type="button">Clear selection</button>
          </p>

          <div id="chart"></div>

          <h3>Language breakdown (selection)</h3>
          <dl id="language-breakdown" class="stats"></dl>
        </div>
      </div>

      <!-- New calendar-style monthly breakdown -->
      <h2>Commit calendar by month</h2>
      <div id="calendar-chart"></div>

      <!-- Tooltip -->
      <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
          <a
            href=""
            id="commit-link"
            target="_blank"
            rel="noopener noreferrer"
          ></a>
        </dd>
        <dt>Date</dt>
        <dd id="commit-date"></dd>
        <dt>Author</dt>
        <dd id="commit-author"></dd>
        <dt>Lines edited</dt>
        <dd id="commit-lines"></dd>
        <dt>Time</dt>
        <dd id="commit-time-tooltip"></dd>
      </dl>
    </main>

    <!-- File unit visualization -->
    <section class="container meta-main">
      <h2>File changes</h2>
      <dl id="files">
        <!-- JS fills this -->
      </dl>
    </section>

    <!-- global theme + meta scripts -->
    <script src="../global.js" type="module"></script>
    <script src="./main.js" type="module"></script>

  </body>
</html>
